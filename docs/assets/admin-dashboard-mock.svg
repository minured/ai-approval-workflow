<!--
  Admin dashboard mockup for ai-approval-workflow.
  Public-safe SVG: shows generic workflows and placeholder statuses.
-->
<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Admin dashboard mockup</title>
  <desc id="desc">A compact admin dashboard lists scheduled workflows and allows safe deletion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F5EF"/>
      <stop offset="1" stop-color="#ECE7DC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#4A3B24" flood-opacity="0.18"/>
    </filter>
    <style>
      .title{font:800 34px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#2C261D;letter-spacing:-0.7px}
      .body{font:600 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#6B6256}
      .h{font:800 17px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#2C261D}
      .cell{font:650 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#493F34}
      .muted{font:600 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#8B8173}
      .mono{font:700 12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#7A5C24}
    </style>
  </defs>
  <rect width="1200" height="680" rx="32" fill="url(#bg)"/>
  <text class="title" x="70" y="78">Small admin surface, fewer sharp edges</text>
  <text class="body" x="72" y="108">The web UI views and soft-deletes tasks. Natural-language creation stays in Codex for review.</text>

  <g transform="translate(86 152)" filter="url(#shadow)">
    <rect width="1028" height="446" rx="28" fill="#FFFDF8" stroke="#DED6C7"/>
    <rect width="1028" height="74" rx="28" fill="#2F2A22"/>
    <text x="34" y="46" font-family="ui-sans-serif,system-ui" font-size="22" font-weight="900" fill="#FFF9EC">ai-approval-workflow</text>
    <rect x="804" y="20" width="190" height="34" rx="17" fill="#443D31"/>
    <text x="830" y="42" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="800" fill="#F5D889">scheduler enabled</text>

    <text class="h" x="34" y="116">Workflows</text>
    <text class="muted" x="34" y="142">View configured tasks and soft-delete YAML when needed.</text>

    <g transform="translate(34 172)">
      <rect width="960" height="46" rx="16" fill="#F4EFE5"/>
      <text class="muted" x="24" y="29">ID</text>
      <text class="muted" x="330" y="29">Schedule</text>
      <text class="muted" x="520" y="29">Steps</text>
      <text class="muted" x="740" y="29">Status</text>
      <text class="muted" x="858" y="29">Action</text>

      <rect y="62" width="960" height="62" rx="18" fill="#FFFDF8" stroke="#E9E2D6"/>
      <text class="cell" x="24" y="100">github-trending-daily</text>
      <text class="mono" x="330" y="100">0 9 * * *</text>
      <text class="cell" x="520" y="100">fetch → summarize → notify</text>
      <rect x="740" y="80" width="78" height="26" rx="13" fill="#E4F7D9"/>
      <text x="760" y="98" font-family="ui-sans-serif,system-ui" font-size="12" font-weight="850" fill="#3D6F24">enabled</text>
      <rect x="858" y="78" width="76" height="30" rx="15" fill="#F7E5E0"/>
      <text x="878" y="98" font-family="ui-sans-serif,system-ui" font-size="12" font-weight="850" fill="#914735">delete</text>

      <rect y="136" width="960" height="62" rx="18" fill="#FFFDF8" stroke="#E9E2D6"/>
      <text class="cell" x="24" y="174">service-upgrade-watch</text>
      <text class="mono" x="330" y="174">0 9 * * *</text>
      <text class="cell" x="520" y="174">check → AI → approval</text>
      <rect x="740" y="154" width="82" height="26" rx="13" fill="#EFE9DF"/>
      <text x="759" y="172" font-family="ui-sans-serif,system-ui" font-size="12" font-weight="850" fill="#7B6A57">disabled</text>
      <rect x="858" y="152" width="76" height="30" rx="15" fill="#F7E5E0"/>
      <text x="878" y="172" font-family="ui-sans-serif,system-ui" font-size="12" font-weight="850" fill="#914735">delete</text>

      <rect y="210" width="960" height="62" rx="18" fill="#FFFDF8" stroke="#E9E2D6"/>
      <text class="cell" x="24" y="248">backup-report-weekly</text>
      <text class="mono" x="330" y="248">0 8 * * 1</text>
      <text class="cell" x="520" y="248">check → summarize → notify</text>
      <rect x="740" y="228" width="78" height="26" rx="13" fill="#E4F7D9"/>
      <text x="760" y="246" font-family="ui-sans-serif,system-ui" font-size="12" font-weight="850" fill="#3D6F24">enabled</text>
      <rect x="858" y="226" width="76" height="30" rx="15" fill="#F7E5E0"/>
      <text x="878" y="246" font-family="ui-sans-serif,system-ui" font-size="12" font-weight="850" fill="#914735">delete</text>
    </g>
  </g>
</svg>
