<!--
  Hero artwork for ai-approval-workflow.
  Public-safe SVG: contains only generic product concepts and placeholder data.
-->
<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ai-approval-workflow hero</title>
  <desc id="desc">A scheduled AI workflow flows into a mobile approval card and a safe allowlisted action.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07141F"/>
      <stop offset="0.52" stop-color="#0D1D2A"/>
      <stop offset="1" stop-color="#17251F"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(248 74) rotate(47) scale(320 220)">
      <stop stop-color="#4DD7FF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#4DD7FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(952 340) rotate(154) scale(380 260)">
      <stop stop-color="#A6F26B" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#A6F26B" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.34"/>
    </filter>
    <style>
      .title{font:700 54px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#F4FAFF;letter-spacing:-1.8px}
      .sub{font:500 19px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#AFC4CF}
      .mono{font:600 15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#B7E7FF}
      .small{font:600 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#D9E8EE}
      .muted{font:500 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#7F98A5}
      .card{fill:#0F2432;stroke:#284353;stroke-width:1.2}
      .line{stroke:#78D4F8;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
      .accent{fill:#9DF26F}
    </style>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="34" fill="url(#glowA)"/>
  <rect width="1200" height="420" rx="34" fill="url(#glowB)"/>

  <g opacity="0.22">
    <path d="M80 92H514M80 154H450M80 216H524M80 278H402M80 340H474" stroke="#87A6B5" stroke-width="1"/>
    <path d="M664 82H1122M710 144H1122M638 206H1122M742 268H1122M690 330H1122" stroke="#87A6B5" stroke-width="1"/>
  </g>

  <text class="title" x="68" y="94">AI tasks that wait</text>
  <text class="title" x="68" y="154">for your approval</text>
  <text class="sub" x="70" y="200">Schedule checks, summarize with AI, notify your phone,</text>
  <text class="sub" x="70" y="228">and run only fixed allowlisted actions after a tap.</text>

  <g transform="translate(70 274)">
    <rect class="card" width="164" height="64" rx="18" filter="url(#softShadow)"/>
    <circle cx="32" cy="32" r="12" fill="#4DD7FF"/>
    <text class="small" x="58" y="28">Cron trigger</text>
    <text class="muted" x="58" y="46">0 9 * * *</text>
  </g>
  <path class="line" d="M246 306H310"/>
  <path class="line" d="M304 300L312 306L304 312"/>

  <g transform="translate(322 274)">
    <rect class="card" width="164" height="64" rx="18" filter="url(#softShadow)"/>
    <circle cx="32" cy="32" r="12" fill="#B7F276"/>
    <text class="small" x="58" y="28">AI summary</text>
    <text class="muted" x="58" y="46">risk + context</text>
  </g>
  <path class="line" d="M498 306H562"/>
  <path class="line" d="M556 300L564 306L556 312"/>

  <g transform="translate(576 274)">
    <rect class="card" width="164" height="64" rx="18" filter="url(#softShadow)"/>
    <circle cx="32" cy="32" r="12" fill="#FFCF66"/>
    <text class="small" x="58" y="28">Phone approval</text>
    <text class="muted" x="58" y="46">approve / skip</text>
  </g>

  <g transform="translate(830 46)" filter="url(#softShadow)">
    <rect x="0" y="0" width="248" height="328" rx="36" fill="#0A1117" stroke="#324A57" stroke-width="2"/>
    <rect x="18" y="20" width="212" height="288" rx="26" fill="#101E28"/>
    <rect x="36" y="46" width="82" height="18" rx="9" fill="#223744"/>
    <circle cx="206" cy="55" r="8" fill="#9DF26F"/>
    <text class="mono" x="36" y="98">AI Approval</text>
    <rect x="34" y="118" width="180" height="74" rx="18" fill="#172B38" stroke="#2F5364"/>
    <text class="small" x="50" y="145">Service update found</text>
    <text class="muted" x="50" y="166">v1.0.0 → v1.1.0</text>
    <text class="muted" x="50" y="184">Risk: medium</text>
    <rect x="34" y="212" width="82" height="42" rx="14" fill="#9DF26F"/>
    <text x="58" y="238" font-family="ui-sans-serif,system-ui" font-size="14" font-weight="800" fill="#102016">Approve</text>
    <rect x="132" y="212" width="82" height="42" rx="14" fill="#263B48" stroke="#48606C"/>
    <text x="160" y="238" font-family="ui-sans-serif,system-ui" font-size="14" font-weight="700" fill="#DDEBF0">Skip</text>
    <text class="muted" x="60" y="286">No shell from AI. Ever.</text>
  </g>
</svg>
