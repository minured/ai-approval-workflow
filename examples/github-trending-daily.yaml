# Example task generated by the generic workflow framework.
# Keep disabled until you review the cron, timezone, and notification channel.
id: github-trending-daily
enabled: false
trigger:
  type: schedule
  cron: "0 9 * * *"
  timezone: Asia/Shanghai
steps:
  - id: fetch
    type: http_fetch
    # Public source only. Do not put tokens or private URLs in workflow YAML.
    url: "https://github.com/trending?since=daily"
    timeout_seconds: 20
    max_bytes: 200000
  - id: summarize
    type: ai_summary
    prompt: "请用中文总结今天 GitHub Trending 的重点项目、语言分布和可关注方向，控制在 8 条以内。"
  - id: notify
    type: notify
    title: "GitHub Trending Daily"
    severity: info
notify:
  channel: ops-default
